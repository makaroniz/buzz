pre-commit:
  parallel: true
  commands:
    rust-fmt:
      run: just fmt
      stage_fixed: true
    desktop-tauri-fmt:
      run: just desktop-tauri-fmt
      stage_fixed: true
    desktop-fix:
      run: just desktop-fix
      stage_fixed: true
    web-fix:
      run: just web-fix
      stage_fixed: true
    mobile-fix:
      run: just mobile-fix
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    rust-tests:
      run: bin/just test-unit
    desktop-test:
      run: bin/just desktop-test
    desktop-tauri-test:
      run: bin/just desktop-tauri-test
    mobile-test:
      run: bin/just mobile-test
